<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAUNT</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07070d;--panel:#0d0d1a;--border:#1a1a2e;
  --accent:#00ff88;--danger:#ff3355;--warn:#ffcc00;
  --text:#c8c8e0;--dim:#4a4a6a;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;}

/* MENU / LOBBY */
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:0.8rem;padding:1rem;overflow-y:auto;}
.screen.active{display:flex;}
h1{font-family:'Creepster',cursive;font-size:clamp(2.5rem,6vw,4rem);color:var(--accent);}
input,button{font-family:'Share Tech Mono',monospace;}

/* GAME */
#gameScreen{display:none;position:fixed;inset:0;}
#gameScreen.active{display:block;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
</style>
</head>

<body>

<!-- MENU -->
<div id="menuScreen" class="screen active">
  <h1>HAUNT</h1>
  <input id="nameInput" placeholder="Pseudo">
  <button id="btnCreate">Créer</button>
  <input id="codeInput" placeholder="Code">
  <button id="btnJoin">Rejoindre</button>
</div>

<!-- GAME -->
<div id="gameScreen">
  <canvas id="canvas"></canvas>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
/* =====================================================
   🔥 FIX IMPORTANT RENDER SOCKET.IO
===================================================== */

// AVANT : const socket = io();
const socket = io({
  transports: ["polling", "websocket"]
});

/* ===================================================== */

let gameMap=null;
let gameState=null;
let myId=null;

/* SOCKET */
socket.on('room_created',d=>{
  myId=d.playerId;
});

socket.on('joined',d=>{
  myId=d.playerId;
});

socket.on('map',m=>{
  gameMap=m;
});

socket.on('state',s=>{
  gameState=s;
});

/* INPUT */
const keys={};

document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',e=>keys[e.code]=false);

function sendInput(){
  if(!gameState) return;

  let dx=0,dy=0;

  if(keys['KeyW']||keys['ArrowUp'])dy=-1;
  if(keys['KeyS']||keys['ArrowDown'])dy=1;
  if(keys['KeyA']||keys['ArrowLeft'])dx=-1;
  if(keys['KeyD']||keys['ArrowRight'])dx=1;

  const action=keys['Space']||keys['KeyE'];

  socket.emit('input',{dx,dy,action});
}

/* RENDER */
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

function render(){
  if(!gameMap||!gameState) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // MAP
  for(let y=0;y<gameMap.length;y++){
    for(let x=0;x<gameMap[y].length;x++){
      if(gameMap[y][x]===1){
        ctx.fillStyle="#1a1a2e";
        ctx.fillRect(x*20,y*20,20,20);
      }
    }
  }

  // PLAYERS
  Object.values(gameState.players||{}).forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x*20,p.y*20,15,15);
  });
}

/* LOOP */
function loop(){
  sendInput();
  render();
  requestAnimationFrame(loop);
}
loop();

/* UI */
document.getElementById('btnCreate').onclick=()=>{
  socket.emit('create_room',{name:document.getElementById('nameInput').value});
};

document.getElementById('btnJoin').onclick=()=>{
  socket.emit('join_room',{
    roomId:document.getElementById('codeInput').value,
    name:document.getElementById('nameInput').value
  });
};
</script>

</body>
</html>
