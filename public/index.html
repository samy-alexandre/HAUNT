<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAUNT</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow:hidden;
  background:#07070d;
  color:#c8c8e0;
  font-family:'Share Tech Mono',monospace;
}

#menu{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input,button{
  padding:10px;
  font-family:inherit;
}

canvas{
  position:fixed;
  inset:0;
}
</style>
</head>

<body>

<div id="menu">
  <h1>HAUNT</h1>
  <input id="nameInput" placeholder="Pseudo">
  <input id="codeInput" placeholder="Code salle">
  <button id="createBtn">Créer</button>
  <button id="joinBtn">Rejoindre</button>
</div>

<canvas id="canvas"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

/* =======================
   🔥 FIX RENDER SOCKET
======================= */
const socket = io({
  transports: ["websocket"]
});

let gameMap = null;
let gameState = null;
let myId = null;

/* =======================
   SOCKET EVENTS
======================= */
socket.on("room_created", d => {
  myId = d.playerId;
  document.getElementById("menu").style.display = "none";
});

socket.on("joined", d => {
  myId = d.playerId;
  document.getElementById("menu").style.display = "none";
});

socket.on("map", m => {
  gameMap = m;
});

socket.on("state", s => {
  gameState = s;
});

/* =======================
   INPUT
======================= */
const keys = {};

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

function sendInput(){
  if(!gameState) return;

  let dx = 0, dy = 0;

  if(keys["KeyW"] || keys["ArrowUp"]) dy = -1;
  if(keys["KeyS"] || keys["ArrowDown"]) dy = 1;
  if(keys["KeyA"] || keys["ArrowLeft"]) dx = -1;
  if(keys["KeyD"] || keys["ArrowRight"]) dx = 1;

  socket.emit("input",{dx,dy});
}

/* =======================
   RENDER
======================= */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.onresize = resize;

function render(){
  if(!gameMap || !gameState) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // MAP
  for(let y=0;y<gameMap.length;y++){
    for(let x=0;x<gameMap[y].length;x++){
      if(gameMap[y][x]===1){
        ctx.fillStyle="#1a1a2e";
        ctx.fillRect(x*20,y*20,20,20);
      }
    }
  }

  // PLAYERS
  Object.values(gameState.players||{}).forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x*20,p.y*20,15,15);
  });
}

/* =======================
   LOOP
======================= */
function loop(){
  sendInput();
  render();
  requestAnimationFrame(loop);
}
loop();

/* =======================
   UI
======================= */
document.getElementById("createBtn").onclick=()=>{
  socket.emit("create_room",{name:document.getElementById("nameInput").value});
};

document.getElementById("joinBtn").onclick=()=>{
  socket.emit("join_room",{
    roomId:document.getElementById("codeInput").value,
    name:document.getElementById("nameInput").value
  });
};

</script>

</body>
</html>
