<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  // ... Tes variables globales existantes (socket, joueurs, etc.) ...

  // === INITIALISATION TROIS.JS ===
  let scene, camera, renderer;
  let meshJoueurs = {}; // Pour stocker les objets 3D des joueurs
  let meshMonstres = {}; // Pour stocker les fantômes 3D
  let meshDecors = [];

  function init3D() {
    // 1. Créer la scène
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x07070d); // Ton thème sombre
    // Ajout du brouillard vert/sombre comme sur l'image
    scene.fog = new THREE.FogExp2(0x0a1a12, 0.15); 

    // 2. Caméra (Perspective pour la 3D, inclinée style "Lethal Company/Repo top-down")
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 6); // Positionnée en hauteur et reculée
    
    // 3. Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    // On remplace ton ancien canvas par celui de Three.js
    document.body.appendChild(renderer.domElement); 

    // 4. Lumières (Ambiance glauque + lumière directionnelle)
    const ambientLight = new THREE.AmbientLight(0x112211, 1.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0x00ff88, 0.5); // Reflet vert
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);
  }

  // === GÉNÉRATION DE LA CARTE EN 3D ===
  // Appelle cette fonction quand tu reçois la map du serveur ('map_data' ou 'game_start')
  function genererCarte3D(mapMatrix) {
    // Nettoyer l'ancien décor si besoin
    meshDecors.forEach(m => scene.add(m));
    
    const geoMur = new THREE.BoxGeometry(1, 2, 1); // Murs de 2 de hauteur
    const matMur = new THREE.MeshStandardMaterial({ color: 0x1a2e26, roughness: 0.8 }); // Style pierre sombre
    
    const geoSol = new THREE.PlaneGeometry(1, 1);
    const matSol = new THREE.MeshStandardMaterial({ color: 0x0c0c1a, roughness: 0.5 });

    for(let y = 0; y < mapMatrix.length; y++) {
      for(let x = 0; x < mapMatrix[y].length; x++) {
        // Si c'est un mur (généralement 1 dans ton tableau)
        if(mapMatrix[y][x] === 1) {
          const mur = new THREE.Mesh(geoMur, matMur);
          mur.position.set(x, 1, y); // x et y de ta grille deviennent X et Z en 3D
          scene.add(mur);
          meshDecors.push(mur);
        } else {
          // Sol
          const sol = new THREE.Mesh(geoSol, matSol);
          sol.rotation.x = -Math.PI / 2;
          sol.position.set(x, 0, y);
          scene.add(sol);
        }
      }
    }
  }

  // === BOUCLE DE RENDU (À mettre à la place de ton ancienne fonction draw()) ===
  function animate() {
    requestAnimationFrame(animate);

    // 1. Mettre à jour la position des joueurs selon les données reçues de socket.io
    Object.keys(roomPlayers).forEach(id => {
      const pData = roomPlayers[id];
      
      // Si le mesh du joueur n'existe pas encore dans la scène, on le crée (ici un cube low-poly ou une capsule)
      if (!meshJoueurs[id]) {
        let color = (id === geometry.id) ? 0x00ff88 : 0xff3355; // Toi en vert, les autres en rouge
        const geoP = new THREE.BoxGeometry(0.6, 1, 0.6); 
        const matP = new THREE.MeshStandardMaterial({ color: color });
        meshJoueurs[id] = new THREE.Mesh(geoP, matP);
        scene.add(meshJoueurs[id]);
      }
      
      // Update des coordonnées (on mappe la 2D sur le plan X/Z de la 3D)
      meshJoueurs[id].position.set(pData.x, 0.5, pData.y);
      
      // Si c'est le joueur local, la caméra le suit
      if (id === socket.id) {
        camera.position.set(pData.x, pData.x + 8, pData.y + 6);
        camera.lookAt(pData.x, 0, pData.y);
      }
    });

    // 2. Mettre à jour les monstres/fantômes (On crée des cubes violets lumineux)
    roomMonsters.forEach(m => {
      if (!meshMonstres[m.id]) {
        const geoM = new THREE.ConeGeometry(0.4, 1, 4); // Forme de fantôme pointu
        const matM = new THREE.MeshBasicMaterial({ color: 0x9933ff });
        meshMonstres[m.id] = new THREE.Mesh(geoM, matM);
        scene.add(meshMonstres[m.id]);
      }
      // Les fantômes lévitent légèrement (Math.sin pour l'effet de flottaison)
      meshMonstres[m.id].position.set(m.x, 0.6 + Math.sin(Date.now() * 0.005) * 0.1, m.y);
    });

    // Rendu de la scène
    renderer.render(scene, camera);
  }

  // Lance l'init au chargement
  window.onload = () => {
    init3D();
    animate();
  };
</script>
