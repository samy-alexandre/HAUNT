<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAUNT — Party Edition</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #16161f;
  --surface-light: #1f1f2e;
  --accent: #00ff88;
  --accent-dim: #00aa55;
  --danger: #ff4466;
  --warning: #ffaa00;
  --text: #e8e8f0;
  --text-dim: #9090a0;
  --border: #2a2a38;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  user-select: none;
}

#canvas3d { display:block; width:100%; height:100vh; }
.screen {
  position: fixed; inset:0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(135deg, #0a0a0f 0%, #16161f 100%);
  z-index: 100;
}
.hidden { display:none !important; }

/* MENU */
#menuScreen .logo {
  font-size: 5rem; font-weight: bold;
  background: linear-gradient(135deg, var(--accent) 0%, #00ffff 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 40px rgba(0,255,136,0.3);
  margin-bottom: 1rem;
  letter-spacing: 0.3rem;
}
.subtitle {
  font-size: 1.2rem; color: var(--text-dim);
  margin-bottom: 3rem; letter-spacing: 0.15rem;
}
.menu-buttons { display:flex; gap:1.5rem; flex-direction:column; }
button {
  background: var(--surface);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 1rem 3rem;
  font-size: 1.1rem;
  font-family: 'Courier New', monospace;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
button:hover {
  border-color: var(--accent);
  background: var(--surface-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,255,136,0.15);
}
button:active { transform: translateY(0); }
button.primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-weight: bold;
}
button.primary:hover {
  background: #00ffaa;
  box-shadow: 0 8px 30px rgba(0,255,136,0.4);
}

/* LOBBY */
#lobbyScreen { padding: 2rem; }
.lobby-header {
  text-align: center;
  margin-bottom: 2rem;
}
.room-code {
  font-size: 3rem;
  color: var(--accent);
  letter-spacing: 0.5rem;
  text-shadow: 0 0 20px rgba(0,255,136,0.3);
}
.players-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 1rem;
  max-width: 800px;
  margin: 2rem auto;
  padding: 1.5rem;
  background: var(--surface);
  border: 2px solid var(--border);
}
.player-slot {
  background: var(--surface-light);
  border: 2px solid var(--border);
  padding: 1rem;
  text-align: center;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.5rem;
}
.player-slot.you { border-color: var(--accent); }
.player-emoji { font-size: 2.5rem; }
.player-name { font-size: 0.9rem; }

.animal-picker {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
  margin: 1rem 0;
}
.animal-btn {
  padding: 0.5rem 1rem;
  font-size: 1.5rem;
  min-width: 3rem;
  border: 2px solid var(--border);
  background: var(--surface-light);
}
.animal-btn.selected {
  border-color: var(--accent);
  background: var(--accent);
}

.trail-picker {
  margin: 2rem auto;
  max-width: 600px;
  padding: 1.5rem;
  background: var(--surface);
  border: 2px solid var(--border);
}
.trail-picker h3 {
  margin-bottom: 1rem;
  color: var(--accent);
}
.trail-options {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}
.trail-btn {
  padding: 0.75rem 1.5rem;
  flex: 1;
  min-width: 120px;
  position: relative;
}
.trail-btn.selected {
  border-color: var(--accent);
  background: var(--surface-light);
}
.trail-btn.locked {
  opacity: 0.4;
  cursor: not-allowed;
}
.trail-btn .lock-icon {
  position: absolute;
  top: 0.5rem;
  right: 0.5rem;
  font-size: 0.8rem;
}

.lobby-actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-top: 2rem;
}

.xp-display {
  position: fixed;
  top: 1rem;
  right: 1rem;
  background: var(--surface);
  border: 2px solid var(--border);
  padding: 1rem;
  min-width: 200px;
  z-index: 101;
}
.xp-level {
  font-size: 1.5rem;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.xp-bar-container {
  background: var(--bg);
  height: 20px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.xp-bar-fill {
  background: linear-gradient(90deg, var(--accent), #00ffff);
  height: 100%;
  transition: width 0.3s;
}
.xp-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--text);
  text-shadow: 0 0 4px #000;
}

/* HUD IN-GAME */
.hud {
  position: fixed;
  z-index: 50;
  pointer-events: none;
}
#topHud {
  top: 1rem;
  left: 1rem;
  right: 1rem;
  display: flex;
  justify-content: space-between;
  gap: 1rem;
}
.hud-box {
  background: rgba(10,10,15,0.85);
  border: 2px solid var(--border);
  padding: 0.75rem 1.5rem;
  backdrop-filter: blur(10px);
}
.hud-label { 
  font-size: 0.75rem; 
  color: var(--text-dim); 
  margin-bottom: 0.25rem;
}
.hud-value {
  font-size: 1.5rem;
  color: var(--accent);
  font-weight: bold;
}
.hud-value.danger { color: var(--danger); }

#bottomHud {
  bottom: 1rem;
  left: 1rem;
  right: 1rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 1rem;
}

.stamina-bar {
  width: 200px;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border: 1px solid var(--border);
  overflow: hidden;
}
.stamina-fill {
  height: 100%;
  background: linear-gradient(90deg, #ffaa00, #ff4466);
  transition: width 0.1s;
}

#minimap {
  width: 180px;
  height: 130px;
  border: 2px solid var(--border);
  background: rgba(0,0,0,0.7);
}

.powerup-icons {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.5rem;
}
.powerup-icon {
  width: 40px;
  height: 40px;
  border: 2px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  position: relative;
}
.powerup-icon.active {
  border-color: var(--accent);
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 10px rgba(0,255,136,0.5); }
  50% { box-shadow: 0 0 20px rgba(0,255,136,0.8); }
}
.powerup-timer {
  position: absolute;
  bottom: -1.5rem;
  font-size: 0.7rem;
  color: var(--text-dim);
}

.boss-hp-bar {
  position: fixed;
  top: 5rem;
  left: 50%;
  transform: translateX(-50%);
  width: 400px;
  z-index: 51;
}
.boss-hp-container {
  background: rgba(10,10,15,0.9);
  border: 2px solid var(--danger);
  padding: 1rem;
  text-align: center;
}
.boss-name {
  font-size: 1.2rem;
  color: var(--danger);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.2rem;
}
.boss-hp-bg {
  background: rgba(0,0,0,0.5);
  height: 24px;
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}
.boss-hp-fill {
  height: 100%;
  background: linear-gradient(90deg, #ff4466, #ff0044);
  transition: width 0.3s;
}
.boss-hp-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  color: #fff;
  text-shadow: 0 0 4px #000;
}

#comboFlash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(0,255,136,0.2) 0%, transparent 70%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 40;
}

#cursedVignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, transparent 40%, rgba(136,0,255,0.3) 100%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 40;
}

#rushFlash {
  position: fixed;
  inset: 0;
  border: 8px solid var(--danger);
  pointer-events: none;
  opacity: 0;
  animation: rushPulse 1s infinite;
  z-index: 40;
}
@keyframes rushPulse {
  0%, 100% { opacity: 0; }
  50% { opacity: 0.6; }
}

#killedMsg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  color: var(--danger);
  text-shadow: 0 0 30px rgba(255,68,102,0.8);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 60;
}

#spectateMsg {
  position: fixed;
  bottom: 6rem;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,10,15,0.9);
  border: 2px solid var(--border);
  padding: 1rem 2rem;
  font-size: 1rem;
  color: var(--text-dim);
  z-index: 60;
}

/* PAUSE */
#pauseScreen {
  background: rgba(10,10,15,0.95);
}
.pause-content {
  text-align: center;
}
.pause-title {
  font-size: 3rem;
  color: var(--accent);
  margin-bottom: 2rem;
}
.pause-buttons {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* END SCREEN */
#endScreen { padding: 2rem; }
.end-content {
  max-width: 800px;
  text-align: center;
}
.end-title {
  font-size: 3rem;
  margin-bottom: 1rem;
}
.end-title.win { color: var(--accent); }
.end-title.lose { color: var(--danger); }
.stars {
  font-size: 3rem;
  margin-bottom: 2rem;
}
.leaderboard {
  background: var(--surface);
  border: 2px solid var(--border);
  padding: 1.5rem;
  margin: 2rem 0;
}
.leaderboard-row {
  display: grid;
  grid-template-columns: 3rem 2fr 1fr 1fr 1fr 1fr;
  gap: 1rem;
  padding: 0.75rem;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.leaderboard-row:last-child { border-bottom: none; }
.leaderboard-row.header {
  font-weight: bold;
  color: var(--text-dim);
  font-size: 0.85rem;
}
.end-actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-top: 2rem;
}

.xp-earned-popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--surface);
  border: 3px solid var(--accent);
  padding: 2rem 3rem;
  z-index: 200;
  text-align: center;
  animation: popIn 0.3s;
}
@keyframes popIn {
  from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
  to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}
.xp-earned-popup h2 {
  color: var(--accent);
  font-size: 2rem;
  margin-bottom: 1rem;
}
.xp-earned-popup .xp-amount {
  font-size: 3rem;
  color: #ffaa00;
  margin-bottom: 1rem;
}

.unlock-notification {
  position: fixed;
  top: 2rem;
  right: 2rem;
  background: var(--surface);
  border: 2px solid var(--accent);
  padding: 1rem 1.5rem;
  z-index: 150;
  animation: slideIn 0.5s, slideOut 0.5s 2.5s;
}
@keyframes slideIn {
  from { transform: translateX(400px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes slideOut {
  from { transform: translateX(0); opacity: 1; }
  to { transform: translateX(400px); opacity: 0; }
}
.unlock-notification h3 {
  color: var(--accent);
  margin-bottom: 0.5rem;
}

input[type="text"] {
  background: var(--surface);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 0.75rem;
  font-size: 1rem;
  font-family: 'Courier New', monospace;
  width: 100%;
  max-width: 300px;
}
input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}

.input-group {
  display: flex;
  gap: 1rem;
  margin-bottom: 1rem;
  align-items: center;
}
</style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<!-- MENU -->
<div id="menuScreen" class="screen">
  <div class="logo">HAUNT</div>
  <div class="subtitle">PARTY EDITION</div>
  <div class="menu-buttons">
    <button class="primary" onclick="showCreateRoom()">CRÉER UNE PARTIE</button>
    <button onclick="showJoinRoom()">REJOINDRE</button>
  </div>
</div>

<!-- CREATE ROOM -->
<div id="createRoomScreen" class="screen hidden">
  <h2 style="margin-bottom:2rem; font-size:2rem;">Créer une partie</h2>
  <div style="display:flex; flex-direction:column; gap:1rem;">
    <input type="text" id="createName" placeholder="Ton pseudo" maxlength="12">
    <button class="primary" onclick="createRoom()">C'EST PARTI</button>
    <button onclick="backToMenu()">Retour</button>
  </div>
</div>

<!-- JOIN ROOM -->
<div id="joinRoomScreen" class="screen hidden">
  <h2 style="margin-bottom:2rem; font-size:2rem;">Rejoindre une partie</h2>
  <div style="display:flex; flex-direction:column; gap:1rem;">
    <input type="text" id="joinCode" placeholder="CODE" maxlength="6" style="text-transform:uppercase;">
    <input type="text" id="joinName" placeholder="Ton pseudo" maxlength="12">
    <button class="primary" onclick="joinRoom()">REJOINDRE</button>
    <button onclick="backToMenu()">Retour</button>
  </div>
</div>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen hidden">
  <div class="lobby-header">
    <div class="room-code" id="roomCodeDisplay"></div>
  </div>
  
  <div class="xp-display">
    <div class="xp-level">Niveau <span id="playerLevelLobby">1</span></div>
    <div class="xp-bar-container">
      <div class="xp-bar-fill" id="xpBarLobby" style="width:0%"></div>
      <div class="xp-text" id="xpTextLobby">0 / 200 XP</div>
    </div>
  </div>

  <div class="trail-picker">
    <h3>🎨 COSMÉTIQUE — TRAINÉE</h3>
    <div class="trail-options" id="trailOptions"></div>
  </div>

  <div class="animal-picker" id="animalPicker"></div>
  
  <div class="players-grid" id="playersGrid"></div>
  
  <div class="lobby-actions">
    <button class="primary" id="startBtn" onclick="startGame()" style="display:none;">LANCER LA PARTIE</button>
    <button onclick="leaveLobby()">QUITTER</button>
  </div>
</div>

<!-- PAUSE -->
<div id="pauseScreen" class="screen hidden">
  <div class="pause-content">
    <div class="pause-title">PAUSE</div>
    <div class="pause-buttons">
      <button class="primary" onclick="resumeGame()">REPRENDRE</button>
      <button onclick="quitToLobby()">QUITTER</button>
    </div>
  </div>
</div>

<!-- END SCREEN -->
<div id="endScreen" class="screen hidden">
  <div class="end-content">
    <div class="end-title" id="endTitle">NIVEAU TERMINÉ</div>
    <div class="stars" id="starsDisplay"></div>
    
    <div class="leaderboard">
      <div class="leaderboard-row header">
        <div></div>
        <div>JOUEUR</div>
        <div>SCORE</div>
        <div>COLIS</div>
        <div>COMBO</div>
        <div>MORTS</div>
      </div>
      <div id="leaderboardRows"></div>
    </div>
    
    <div class="end-actions">
      <button class="primary" id="nextLevelBtn" onclick="nextLevel()" style="display:none;">NIVEAU SUIVANT</button>
      <button id="restartBtn" onclick="restartGame()" style="display:none;">RECOMMENCER</button>
      <button onclick="quitToLobby()">LOBBY</button>
    </div>
  </div>
</div>

<!-- HUD -->
<div id="topHud" class="hud hidden">
  <div class="hud-box">
    <div class="hud-label">NIVEAU</div>
    <div class="hud-value" id="levelDisplay">1</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">COLIS</div>
    <div class="hud-value" id="itemsDisplay">0/8</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">VIES</div>
    <div class="hud-value" id="livesDisplay">3</div>
  </div>
  <div class="hud-box">
    <div class="hud-label">SCORE</div>
    <div class="hud-value" id="scoreDisplay">0</div>
  </div>
  <div class="hud-box" id="statusBox">
    <div class="hud-label">STATUT</div>
    <div class="hud-value" id="statusDisplay">—</div>
  </div>
</div>

<div id="bottomHud" class="hud hidden">
  <div>
    <div class="hud-box" style="margin-bottom:0.5rem;">
      <div class="hud-label">SPRINT</div>
      <div class="stamina-bar">
        <div class="stamina-fill" id="staminaFill" style="width:100%"></div>
      </div>
    </div>
    <div class="powerup-icons" id="powerupIcons">
      <div class="powerup-icon" id="speedIcon">⚡<div class="powerup-timer" id="speedTimer"></div></div>
      <div class="powerup-icon" id="shieldIcon">🛡️<div class="powerup-timer" id="shieldTimer"></div></div>
      <div class="powerup-icon" id="freezeIcon">❄️<div class="powerup-timer" id="freezeTimer"></div></div>
    </div>
  </div>
  <canvas id="minimap" width="180" height="130"></canvas>
</div>

<div id="bossHpBar" class="boss-hp-bar hidden">
  <div class="boss-hp-container">
    <div class="boss-name" id="bossName">BOSS FANTÔME</div>
    <div class="boss-hp-bg">
      <div class="boss-hp-fill" id="bossHpFill" style="width:100%"></div>
      <div class="boss-hp-text" id="bossHpText">100 / 100</div>
    </div>
  </div>
</div>

<div id="comboFlash"></div>
<div id="cursedVignette"></div>
<div id="rushFlash" class="hidden"></div>
<div id="killedMsg">MORT</div>
<div id="spectateMsg" class="hidden">Appuie sur TAB pour changer de joueur</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const socket=io();
const TILE=2, WALL_H=3.5, EYE_H=1.72, PLAYER_R=0.44;
const STAM_MAX=120, STAM_DRAIN=2, STAM_REGEN=0.667;
const SPAWN_X=1.5, SPAWN_Y=1.5, SPAWN_SAFE_R=3.5;

const animals=[
  {name:'Chat',emoji:'🐱',color:'#ff6b9d'},
  {name:'Singe',emoji:'🐵',color:'#ffa500'},
  {name:'Renard',emoji:'🦊',color:'#ff4500'},
  {name:'Ours',emoji:'🐻',color:'#8b4513'},
  {name:'Grenouille',emoji:'🐸',color:'#00ff88'},
  {name:'Lapin',emoji:'🐰',color:'#ff69b4'}
];

const seasons={
  winter:{wall:'#7788aa',floor:'#556677',fog:'#445566',amb:'#667788',lt:'#aabbcc'},
  spring:{wall:'#88aa77',floor:'#779966',fog:'#667744',amb:'#88aa66',lt:'#aaccaa'},
  summer:{wall:'#ccaa77',floor:'#aa8855',fog:'#886633',amb:'#ccaa88',lt:'#ffddaa'},
  autumn:{wall:'#aa7755',floor:'#885533',fog:'#663311',amb:'#aa7744',lt:'#cc9966'}
};

const trails={
  none:{name:'Aucun',color:null,unlockLevel:1},
  fire:{name:'Feu',color:'#ff4400',unlockLevel:3},
  ice:{name:'Glace',color:'#00ffff',unlockLevel:5},
  gold:{name:'Or',color:'#ffaa00',unlockLevel:8},
  rainbow:{name:'Arc-en-ciel',color:'rainbow',unlockLevel:10}
};

// PLAYER DATA (localStorage)
let playerData=JSON.parse(localStorage.getItem('haunt_player_data')||'{"xp":0,"level":1,"selectedTrail":"none"}');
function savePlayerData(){localStorage.setItem('haunt_player_data',JSON.stringify(playerData));}
function getXPForLevel(lvl){return lvl*200;}

let myId=null, roomId=null, isHost=false;
let gameState={}, map=[], season='autumn', pw=28, ph=20;
let scene, camera, renderer, maze, ghosts=[], items=[], exitObj, players={}, boss=null;
let keys={}, mouseX=0, mouseY=0, locked=false, paused=false;
let yaw=0, pitch=0, velX=0, velZ=0, stamina=STAM_MAX;
let spectating=false, spectateIdx=0;
let bobT=0, shakeT=0, shakeAmt=0;
let stepTimer=0, stepSide=0;
let particles=[];
let actx, musMaster, sfxMaster;
let prevItemIds=new Set(), comboTimer=0, killedTimer=0;
let rushActive=false, cursedActive=false;
let trailParticles=[];

// SCREENS
function showScreen(id){
  ['menuScreen','createRoomScreen','joinRoomScreen','lobbyScreen','pauseScreen','endScreen'].forEach(s=>{
    const el=document.getElementById(s);
    if(el) el.classList.add('hidden');
  });
  if(id){
    const el=document.getElementById(id);
    if(el) el.classList.remove('hidden');
  }
}
function showCreateRoom(){showScreen('createRoomScreen');}

socket.on('state',state=>{
  gameState=state;
  const me=state.players[myId];
  if(me){
    document.getElementById('livesDisplay').textContent=me.lives||0;
    document.getElementById('scoreDisplay').textContent=state.score||0;
    document.getElementById('itemsDisplay').textContent=`${state.itemsDelivered||0}/${state.totalItems||0}`;
    const stam=(me.stamina||0)/STAM_MAX*100;
    document.getElementById('staminaFill').style.width=stam+'%';
    stamina=me.stamina||0;
    
    // Power-up icons
    const speedActive=me.speedActive>0;
    const shieldActive=me.shieldActive>0;
    const freezeActive=me.freezeActive>0;
    document.getElementById('speedIcon').classList.toggle('active',speedActive);
    document.getElementById('shieldIcon').classList.toggle('active',shieldActive);
    document.getElementById('freezeIcon').classList.toggle('active',freezeActive);
    document.getElementById('speedTimer').textContent=speedActive?Math.ceil(me.speedActive/30)+'s':'';
    document.getElementById('shieldTimer').textContent=shieldActive?Math.ceil(me.shieldActive/30)+'s':'';
    document.getElementById('freezeTimer').textContent=freezeActive?Math.ceil(me.freezeActive/30)+'s':'';
    
    let statusTxt='';
    if(me.carrying!==null) statusTxt='📦 COLIS';
    else if(me.comboActive) statusTxt='🔥 COMBO ×2';
    document.getElementById('statusDisplay').textContent=statusTxt||'—';
    
    if(me.dead&&!spectating){
      spectating=true;
      document.getElementById('killedMsg').style.opacity='1';
      killedTimer=90;
      damageFlash();
      playSound('death');
      document.getElementById('spectateMsg').classList.remove('hidden');
    }
    if(!me.dead&&spectating){
      spectating=false;
      document.getElementById('killedMsg').style.opacity='0';
      document.getElementById('spectateMsg').classList.add('hidden');
    }
  }
  
  rushActive=state.rushActive;
  cursedActive=state.cursedActive;
  if(!cursedActive){
    document.getElementById('cursedVignette').style.opacity='0';
  }
  
  if(state.gameWon&&!paused){
    paused=true;
    stopPointerLock();
    renderEndScreen(state);
  }
  if(state.gameOver&&!paused){
    paused=true;
    stopPointerLock();
    renderGameOver(state);
  }
});

// THREE.JS
function initThree(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,100);
  camera.position.set(SPAWN_X*TILE,EYE_H,SPAWN_Y*TILE);
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas3d'),antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=true;
  scene.add(new THREE.AmbientLight('#667788',0.4));
  buildMaze(map);
}

function buildMaze(m){
  if(!scene) return;
  const s=seasons[season]||seasons.autumn;
  scene.fog=new THREE.Fog(s.fog,8,35);
  const wallTex=makeWallTex(s.wall);
  const floorTex=makeFloorTex(s.floor);
  const ceilTex=makeCeilTex('#1a1a22');
  wallTex.wrapS=wallTex.wrapT=THREE.RepeatWrapping;
  floorTex.wrapS=floorTex.wrapT=THREE.RepeatWrapping;
  ceilTex.wrapS=ceilTex.wrapT=THREE.RepeatWrapping;
  const wallMat=new THREE.MeshStandardMaterial({map:wallTex,roughness:0.9});
  const floorMat=new THREE.MeshStandardMaterial({map:floorTex,roughness:0.8});
  const ceilMat=new THREE.MeshStandardMaterial({map:ceilTex,roughness:1.0});
  maze=new THREE.Group();
  for(let y=0;y<m.length;y++){
    for(let x=0;x<m[y].length;x++){
      if(m[y][x]===1){
        const wall=new THREE.Mesh(new THREE.BoxGeometry(TILE,WALL_H,TILE),wallMat);
        wall.position.set(x*TILE+TILE/2,WALL_H/2,y*TILE+TILE/2);
        wall.castShadow=true;
        wall.receiveShadow=true;
        maze.add(wall);
      }
    }
  }
  const fw=m[0].length*TILE, fh=m.length*TILE;
  const floor=new THREE.Mesh(new THREE.PlaneGeometry(fw,fh),floorMat);
  floor.rotation.x=-Math.PI/2;
  floor.position.set(fw/2,0,fh/2);
  floor.receiveShadow=true;
  floorTex.repeat.set(fw/2,fh/2);
  maze.add(floor);
  const ceil=new THREE.Mesh(new THREE.PlaneGeometry(fw,fh),ceilMat);
  ceil.rotation.x=Math.PI/2;
  ceil.position.set(fw/2,WALL_H,fh/2);
  ceilTex.repeat.set(fw/4,fh/4);
  maze.add(ceil);
  for(let i=0;i<12;i++){
    const lx=Math.random()*fw, lz=Math.random()*fh;
    const pt=new THREE.PointLight(s.lt,0.3,10);
    pt.position.set(lx,WALL_H-0.5,lz);
    maze.add(pt);
  }
  const spawnGlow=new THREE.Mesh(
    new THREE.CircleGeometry(3,32),
    new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:0.1,side:THREE.DoubleSide})
  );
  spawnGlow.rotation.x=-Math.PI/2;
  spawnGlow.position.set(SPAWN_X*TILE,0.01,SPAWN_Y*TILE);
  maze.add(spawnGlow);
  scene.add(maze);
}

function makeWallTex(baseColor){
  const c=document.createElement('canvas');
  c.width=c.height=256;
  const ctx=c.getContext('2d');
  ctx.fillStyle=baseColor;
  ctx.fillRect(0,0,256,256);
  for(let i=0;i<400;i++){
    const x=Math.random()*256,y=Math.random()*256;
    ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.1})`;
    ctx.fillRect(x,y,2,2);
  }
  for(let y=0;y<256;y+=32){
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(0,y,256,2);
  }
  for(let x=0;x<256;x+=64){
    ctx.fillStyle='rgba(0,0,0,0.12)';
    ctx.fillRect(x,0,2,256);
  }
  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  return tex;
}

function makeFloorTex(baseColor){
  const c=document.createElement('canvas');
  c.width=c.height=256;
  const ctx=c.getContext('2d');
  ctx.fillStyle=baseColor;
  ctx.fillRect(0,0,256,256);
  for(let y=0;y<256;y+=64){
    for(let x=0;x<256;x+=64){
      const shade=Math.random()*0.08;
      ctx.fillStyle=`rgba(0,0,0,${shade})`;
      ctx.fillRect(x+1,y+1,62,62);
    }
  }
  for(let i=0;i<300;i++){
    const x=Math.random()*256,y=Math.random()*256;
    ctx.fillStyle=`rgba(0,0,0,${Math.random()*0.08})`;
    ctx.fillRect(x,y,1,1);
  }
  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  return tex;
}

function makeCeilTex(baseColor){
  const c=document.createElement('canvas');
  c.width=c.height=128;
  const ctx=c.getContext('2d');
  ctx.fillStyle=baseColor;
  ctx.fillRect(0,0,128,128);
  for(let i=0;i<100;i++){
    const x=Math.random()*128,y=Math.random()*128;
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.03})`;
    ctx.fillRect(x,y,1,1);
  }
  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  return tex;
}

function makeGhost(type){
  const g=new THREE.Group();
  const bodyR=type==='boss'?1.5:0.55;
  const body=new THREE.Mesh(
    new THREE.SphereGeometry(bodyR,16,16),
    new THREE.MeshStandardMaterial({
      color:type==='hunter'?0xdd2222:type==='twin'?0xaa22dd:type==='boss'?0x8800ff:0xff8822,
      emissive:type==='hunter'?0x441111:type==='twin'?0x221144:type==='boss'?0x440088:0x442211,
      emissiveIntensity:0.4
    })
  );
  body.castShadow=true;
  g.add(body);
  const tail=new THREE.Mesh(
    new THREE.CylinderGeometry(bodyR*0.4,bodyR*0.9,bodyR*1.4,16),
    body.material
  );
  tail.position.y=-bodyR*0.9;
  g.add(tail);
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    const hem=new THREE.Mesh(
      new THREE.SphereGeometry(bodyR*0.15,8,8),
      body.material
    );
    hem.position.set(Math.cos(a)*bodyR*0.6,-bodyR*1.3,Math.sin(a)*bodyR*0.6);
    g.add(hem);
  }
  const eyeGeo=new THREE.SphereGeometry(bodyR*0.15,8,8);
  const eyeMat=new THREE.MeshBasicMaterial({color:type==='hunter'?0xff0000:0xffffff});
  const le=new THREE.Mesh(eyeGeo,eyeMat);
  le.position.set(-bodyR*0.3,bodyR*0.2,bodyR*0.6);
  g.add(le);
  const re=new THREE.Mesh(eyeGeo,eyeMat);
  re.position.set(bodyR*0.3,bodyR*0.2,bodyR*0.6);
  g.add(re);
  if(type==='hunter'){
    const brow=new THREE.Mesh(
      new THREE.BoxGeometry(bodyR*0.8,bodyR*0.08,bodyR*0.08),
      new THREE.MeshBasicMaterial({color:0xff0000})
    );
    brow.position.set(0,bodyR*0.4,bodyR*0.6);
    brow.rotation.z=Math.PI*0.1;
    g.add(brow);
  }
  if(type==='boss'){
    const crown=new THREE.Mesh(
      new THREE.CylinderGeometry(bodyR*0.6,bodyR*0.8,bodyR*0.3,8),
      new THREE.MeshStandardMaterial({color:0xffaa00,emissive:0xffaa00,emissiveIntensity:0.6})
    );
    crown.position.y=bodyR+0.2;
    g.add(crown);
  }
  const glow=new THREE.PointLight(
    type==='hunter'?0xff2222:type==='twin'?0xaa22dd:type==='boss'?0x8800ff:0xff8822,
    type==='boss'?2.0:0.8,
    type==='boss'?10:4
  );
  glow.position.y=bodyR*0.5;
  g.add(glow);
  return g;
}

  g.add(head);
  const legL=new THREE.Mesh(
    new THREE.BoxGeometry(0.25,0.6,0.25),
    new THREE.MeshStandardMaterial({color})
  );
  legL.position.set(-0.15,-0.3,0);
  g.add(legL);
  const legR=new THREE.Mesh(
    new THREE.BoxGeometry(0.25,0.6,0.25),
    new THREE.MeshStandardMaterial({color})
  );
  legR.position.set(0.15,-0.3,0);
  g.add(legR);
  const nameplate=makeSprite(animals[animal||0].emoji+' '+name,color,'rgba(0,0,0,0.7)');
  nameplate.position.y=2.0;
  g.add(nameplate);
  return g;
}

function makeSprite(text,color,bg){
  const c=document.createElement('canvas');
  c.width=256; c.height=64;
  const ctx=c.getContext('2d');
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,256,64);
  ctx.fillStyle=color;
  ctx.font='bold 32px Arial';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(text,128,32);
  const tex=new THREE.CanvasTexture(c);
  const mat=new THREE.SpriteMaterial({map:tex,depthTest:true});
  const sprite=new THREE.Sprite(mat);
  sprite.scale.set(2,0.5,1);
  return sprite;
}

function cleanupScene(){
  if(!scene) return;
  ghosts.forEach(g=>scene.remove(g));
  items.forEach(i=>scene.remove(i));
  Object.values(players).forEach(p=>scene.remove(p));
  if(exitObj) scene.remove(exitObj);
  if(boss) scene.remove(boss);
  if(maze) scene.remove(maze);
  ghosts=[]; items=[]; players={}; exitObj=null; boss=null; maze=null;
  particles.forEach(p=>scene.remove(p.obj));
  particles=[];
  trailParticles.forEach(p=>scene.remove(p.obj));
  trailParticles=[];
}

function spawnParticles(x,z,color,count){
  if(!scene) return;
  for(let i=0;i<count;i++){
    const geo=new THREE.BufferGeometry();
    const pos=new Float32Array([0,0,0]);
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    const mat=new THREE.PointsMaterial({
      color:color,
      size:0.15,
      transparent:true,
      opacity:1
    });
    const p=new THREE.Points(geo,mat);
    p.position.set(x,0.5,z);
    scene.add(p);
    particles.push({
      obj:p,
      vx:(Math.random()-0.5)*0.05,
      vy:Math.random()*0.08+0.05,
      vz:(Math.random()-0.5)*0.05,
      life:60
    });
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.obj.position.x+=p.vx;
    p.obj.position.y+=p.vy;
    p.obj.position.z+=p.vz;
    p.vy-=0.003;
    p.life--;
    p.obj.material.opacity=p.life/60;
    if(p.life<=0){
      scene.remove(p.obj);
      particles.splice(i,1);
    }
  }
}

function spawnTrailParticle(x,z){
  if(!scene||!playerData.selectedTrail||playerData.selectedTrail==='none') return;
  const trail=trails[playerData.selectedTrail];
  let color=trail.color;
  if(color==='rainbow'){
    const hue=Date.now()%1000/1000*360;
    color=`hsl(${hue},100%,50%)`;
  }
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array([0,0,0]);
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({
    color:color,
    size:0.2,
    transparent:true,
    opacity:0.8
  });
  const p=new THREE.Points(geo,mat);
  p.position.set(x,0.3,z);
  scene.add(p);
  trailParticles.push({obj:p,life:30});
}

function updateTrailParticles(){
  for(let i=trailParticles.length-1;i>=0;i--){
    const p=trailParticles[i];
    p.life--;
    p.obj.material.opacity=p.life/30*0.8;
    if(p.life<=0){
      scene.remove(p.obj);
      trailParticles.splice(i,1);
    }
  }
}

function damageFlash(){
  if(!renderer) return;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:radial-gradient(circle,transparent 30%,rgba(255,68,102,0.6) 100%);pointer-events:none;z-index:999;';
  document.body.appendChild(overlay);
  setTimeout(()=>overlay.remove(),500);
}

function screenShake(amt){
  shakeAmt=amt;
  shakeT=15;
}

// POINTER LOCK
function startPointerLock(){
  document.body.requestPointerLock();
}
function stopPointerLock(){
  document.exitPointerLock();
}
document.addEventListener('pointerlockchange',()=>{
  locked=document.pointerLockElement===document.body;
});
document.addEventListener('mousemove',e=>{
  if(!locked) return;
  yaw-=e.movementX*0.002;
  pitch-=e.movementY*0.002;
  pitch=Math.max(-Math.PI/2,Math.min(Math.PI/2,pitch));
});

// KEYBOARD
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT') return;
  keys[e.key.toLowerCase()]=true;
  if(e.key==='Escape'&&!paused){
    paused=true;
    stopPointerLock();
    showScreen('pauseScreen');
  }
  if(e.key==='Tab'&&spectating){
    e.preventDefault();
    const alive=Object.values(gameState.players||{}).filter(p=>!p.dead&&p.id!==myId);
    if(alive.length){
      spectateIdx=(spectateIdx+1)%alive.length;
    }
  }
});
document.addEventListener('keyup',e=>{
  keys[e.key.toLowerCase()]=false;
});

// PHYSICS
function isWall(tx,tz){
  if(tx<0||tz<0||tx>=map[0].length||tz>=map.length) return true;
  return map[Math.floor(tz)][Math.floor(tx)]===1;
}
function resolveCol(px,pz,r){
  for(let i=0;i<4;i++){
    const corners=[
      [px-r,pz-r],[px+r,pz-r],[px-r,pz+r],[px+r,pz+r]
    ];
    let hit=false;
    for(const[cx,cz]of corners){
      const tx=Math.floor(cx),tz=Math.floor(cz);
      if(isWall(tx,tz)){
        const wcx=tx+0.5,wcz=tz+0.5;
        const dx=px-wcx,dz=pz-wcz;
        const dist=Math.sqrt(dx*dx+dz*dz);
        if(dist<r+0.5){
          const pushD=r+0.5-dist+0.01;
          const angle=Math.atan2(dz,dx);
          px+=Math.cos(angle)*pushD;
          pz+=Math.sin(angle)*pushD;
          hit=true;
        }
      }
    }
    if(!hit) break;
  }
  return{x:px,z:pz};
}

// MOVEMENT
function updateMovement(dt){
  if(paused||!camera) return;
  const me=gameState.players?.[myId];
  if(!me||me.dead) return;
  
  // Input
  let inputX=0,inputZ=0;
  if(keys['w']||keys['z']) inputZ-=1;
  if(keys['s']) inputZ+=1;
  if(keys['a']||keys['q']) inputX-=1;
  if(keys['d']) inputX+=1;
  const moving=inputX!==0||inputZ!==0;
  
  // Speed
  const walking=!keys['shift']||stamina<=0;
  const targetSpd=walking?3.2:6.5;
  const acc=12, drag=22;
  
  if(moving){
    const angle=yaw+Math.atan2(inputX,inputZ);
    const ax=Math.sin(angle)*acc*dt;
    const az=Math.cos(angle)*acc*dt;
    velX+=ax; velZ+=az;
    const mag=Math.sqrt(velX*velX+velZ*velZ);
    if(mag>targetSpd){velX=velX/mag*targetSpd;velZ=velZ/mag*targetSpd;}
  }
  velX*=(1-drag*dt); velZ*=(1-drag*dt);
  if(Math.abs(velX)<0.01) velX=0;
  if(Math.abs(velZ)<0.01) velZ=0;
  
  const speed=Math.sqrt(velX*velX+velZ*velZ);
  const sprinting=speed>4.5;
  
  // Collision
  const wx=(camera.position.x+velX*dt)/TILE;
  const wz=(camera.position.z+velZ*dt)/TILE;
  const resolved=resolveCol(wx,wz,PLAYER_R);
  camera.position.x=resolved.x*TILE;
  camera.position.z=resolved.z*TILE;
  
  // Head bob
  if(speed>0.5){
    const freq=sprinting?11:6;
    const amp=sprinting?0.038:0.055;
    bobT+=dt*freq;
    camera.position.y=EYE_H+Math.sin(bobT)*amp;
    
    // Footsteps
    stepTimer+=dt;
    const stepInterval=sprinting?0.32:0.52;
    if(stepTimer>=stepInterval){
      stepTimer=0;
      stepSide=1-stepSide;
      playSound(stepSide?'step_l':'step_r');
    }
  } else {
    camera.position.y=EYE_H;
    stepTimer=0;
  }
  
  // Screen shake
  if(shakeT>0){
    camera.position.x+=(Math.random()-0.5)*shakeAmt;
    camera.position.y+=(Math.random()-0.5)*shakeAmt;
    camera.position.z+=(Math.random()-0.5)*shakeAmt;
    shakeT--;
  }
  
  // FOV
  const targetFov=sprinting?82:72;
  camera.fov+=(targetFov-camera.fov)*0.1;
  camera.updateProjectionMatrix();
  
  // Trail
  if(speed>1&&Math.random()<0.3){
    spawnTrailParticle(camera.position.x,camera.position.z);
  }
  
  // Camera rotation
  camera.rotation.set(pitch,yaw,0,'YXZ');
}

function updateObjects(dt){
  if(!scene||paused) return;
  
  // Ghosts
  const st=gameState.monsters||[];
  while(ghosts.length<st.length){
    const g=makeGhost('rover');
    scene.add(g);
    ghosts.push(g);
  }
  while(ghosts.length>st.length){
    const g=ghosts.pop();
    scene.remove(g);
  }
  st.forEach((m,i)=>{
    if(ghosts[i]){
      ghosts[i].position.set(m.x*TILE,0.6,m.y*TILE);
      if(!ghosts[i].userData.type||ghosts[i].userData.type!==m.type){
        scene.remove(ghosts[i]);
        ghosts[i]=makeGhost(m.type);
        scene.add(ghosts[i]);
        ghosts[i].userData.type=m.type;
      }
      ghosts[i].rotation.y+=dt*2;
    }
  });
  
  // Boss
  if(gameState.boss&&gameState.boss.hp>0){
    if(!boss){
      boss=makeGhost('boss');
      scene.add(boss);
    }
    boss.position.set(gameState.boss.x*TILE,1.5,gameState.boss.y*TILE);
    boss.rotation.y+=dt*0.5;
  } else if(boss){
    scene.remove(boss);
    boss=null;
  }
  
  // Items
  const it=gameState.items||[];
  const currentIds=new Set(it.filter(i=>!i.collected&&i.carriedBy===null).map(i=>i.id));
  const newIds=new Set([...currentIds].filter(id=>!prevItemIds.has(id)));
  newIds.forEach(id=>{
    const item=it.find(i=>i.id===id);
    if(item){
      let col=0x8b4513;
      if(item.type==='golden') col=0xffaa00;
      if(item.type==='cursed') col=0x8800ff;
      if(item.type==='powerup'){
        if(item.powerUpType==='speed') col=0xffff00;
        if(item.powerUpType==='shield') col=0x0088ff;
        if(item.powerUpType==='freeze') col=0x00ffff;
      }
      spawnParticles(item.x*TILE,item.y*TILE,col,8);
    }
  });
  prevItemIds=currentIds;
  
  while(items.length<it.length){
    const i=makeItem('normal',null);
    scene.add(i);
    items.push(i);
  }
  while(items.length>it.length){
    const i=items.pop();
    scene.remove(i);
  }
  it.forEach((item,idx)=>{
    if(items[idx]){
      if(item.carriedBy===null&&!item.collected){
        items[idx].visible=true;
        items[idx].position.set(item.x*TILE,0.3+Math.sin(Date.now()*0.002)*0.1,item.y*TILE);
        items[idx].rotation.y+=dt*2;
        if(!items[idx].userData.type||items[idx].userData.type!==item.type||items[idx].userData.powerUpType!==item.powerUpType){
          scene.remove(items[idx]);
          items[idx]=makeItem(item.type,item.powerUpType);
          scene.add(items[idx]);
          items[idx].userData.type=item.type;
          items[idx].userData.powerUpType=item.powerUpType;
        }
      } else {
        items[idx].visible=false;
      }
    }
  });
  
  // Exit
  if(gameState.exit){
    if(!exitObj){
      exitObj=makeExit();
      scene.add(exitObj);
    }
    exitObj.position.set(gameState.exit.x*TILE,WALL_H/2,gameState.exit.y*TILE);
    exitObj.children[0].rotation.z+=dt*0.5;
    exitObj.children[1].rotation.z-=dt*0.8;
  }
  
  // Players
  const pls=gameState.players||{};
  Object.keys(players).forEach(id=>{
    if(!pls[id]){
      scene.remove(players[id]);
      delete players[id];
    }
  });
  Object.values(pls).forEach(p=>{
    if(p.id===myId) return;
    if(!players[p.id]){
      players[p.id]=makePlayer(p.color,p.animal,p.name);
      scene.add(players[p.id]);
    }
    if(!p.dead){
      players[p.id].visible=true;
      players[p.id].position.set(p.x*TILE,0,p.y*TILE);
      if(p.yaw!==undefined) players[p.id].rotation.y=-p.yaw;
    } else {
      players[p.id].visible=false;
    }
  });
  
  // Timers
  if(comboTimer>0) comboTimer--;
  if(killedTimer>0){
    killedTimer--;
    if(killedTimer===0){
      document.getElementById('killedMsg').style.opacity='0';
    }
  }
  
  updateParticles(dt);
  updateTrailParticles();
}

// MINIMAP
let mmCtx;
function initMinimap(){
  const cv=document.getElementById('minimap');
  mmCtx=cv.getContext('2d');
}
function drawMinimap(){
  if(!mmCtx||!map.length) return;
  const cv=mmCtx.canvas;
  mmCtx.clearRect(0,0,cv.width,cv.height);
  const scale=6;
  map.forEach((row,y)=>{
    row.forEach((cell,x)=>{
      if(cell===1){
        mmCtx.fillStyle='#555';
        mmCtx.fillRect(x*scale,y*scale,scale,scale);
      }
    });
  });
  (gameState.items||[]).forEach(i=>{
    if(!i.collected&&i.carriedBy===null){
      mmCtx.fillStyle=i.type==='golden'?'#ffaa00':i.type==='cursed'?'#8800ff':i.type==='powerup'?'#00ffff':'#8b4513';
      mmCtx.fillRect(i.x*scale-2,i.y*scale-2,4,4);
    }
  });
  (gameState.monsters||[]).forEach(m=>{
    mmCtx.fillStyle=m.type==='hunter'?'#ff0000':'#ff8800';
    mmCtx.fillRect(m.x*scale-2,m.y*scale-2,4,4);
  });
  if(gameState.boss&&gameState.boss.hp>0){
    mmCtx.fillStyle='#8800ff';
    mmCtx.fillRect(gameState.boss.x*scale-3,gameState.boss.y*scale-3,6,6);
  }
  Object.values(gameState.players||{}).forEach(p=>{
    if(p.id===myId){
      mmCtx.fillStyle='#00ff88';
      const px=(camera.position.x/TILE)*scale;
      const pz=(camera.position.z/TILE)*scale;
      mmCtx.beginPath();
      mmCtx.arc(px,pz,3,0,Math.PI*2);
      mmCtx.fill();
      const len=10;
      const ex=px+Math.sin(yaw)*len;
      const ez=pz+Math.cos(yaw)*len;
      mmCtx.strokeStyle='#00ff88';
      mmCtx.lineWidth=2;
      mmCtx.beginPath();
      mmCtx.moveTo(px,pz);
      mmCtx.lineTo(ex,ez);
      mmCtx.stroke();
    } else if(!p.dead){
      mmCtx.fillStyle=p.color;
      mmCtx.fillRect(p.x*scale-2,p.y*scale-2,4,4);
    }
  });
}

// NETWORK
let lastSend=0;
function sendNet(){
  const now=Date.now();
  if(now-lastSend<33) return;
  lastSend=now;
  if(!camera||paused) return;
  const me=gameState.players?.[myId];
  if(!me||me.dead) return;
  const lx=camera.position.x/TILE;
  const lz=camera.position.z/TILE;
  const tx=Math.floor(lx),tz=Math.floor(lz);
  let dx=0,dz=0;
  if(keys['w']||keys['z']) dz=-1;
  if(keys['s']) dz=1;
  if(keys['a']||keys['q']) dx=-1;
  if(keys['d']) dx=1;
  const action=keys['e']||keys[' '];
  const boost=keys['shift']&&stamina>0;
  socket.emit('input',{dx,dy:dz,action,boost,dir:'down',lx,ly:lz,yaw});
  if(action){keys['e']=false;keys[' ']=false;}
}

// AUDIO
function initAudio(){
  actx=new (window.AudioContext||window.webkitAudioContext)();
  musMaster=actx.createGain(); musMaster.gain.value=0.35; musMaster.connect(actx.destination);
  sfxMaster=actx.createGain(); sfxMaster.gain.value=0.8; sfxMaster.connect(actx.destination);
}

function tone(f,t,d,v){
  const osc=actx.createOscillator(), gain=actx.createGain();
  osc.type=t; osc.frequency.value=f;
  gain.gain.setValueAtTime(v,actx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01,actx.currentTime+d);
  osc.connect(gain).connect(sfxMaster);
  osc.start(); osc.stop(actx.currentTime+d);
}

function playSound(name){
  if(!actx) return;
  if(name==='pickup') tone(600,'square',0.1,0.3);
  if(name==='drop') tone(300,'square',0.1,0.3);
  if(name==='score') tone(800,'sine',0.2,0.4);
  if(name==='golden_score'){tone(1200,'sine',0.15,0.4);setTimeout(()=>tone(1600,'sine',0.15,0.4),80);}
  if(name==='death'){tone(200,'sawtooth',0.5,0.5);setTimeout(()=>tone(150,'sawtooth',0.3,0.4),100);}
  if(name==='win'){[800,1000,1200].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.3,0.4),i*100));}
  if(name==='combo') tone(1000,'triangle',0.3,0.5);
  if(name==='rush') tone(400,'triangle',0.5,0.6);
  if(name==='cursed') tone(150,'sawtooth',0.8,0.5);
  if(name==='powerup') tone(1200,'sine',0.2,0.5);
  if(name==='boss_death'){for(let i=0;i<5;i++)setTimeout(()=>tone(200-i*20,'sawtooth',0.4,0.6),i*100);}
  if(name==='step_l') tone(80+Math.random()*10,'triangle',0.06,0.15);
  if(name==='step_r') tone(70+Math.random()*10,'triangle',0.06,0.15);
}

socket.on('sound',name=>playSound(name));

function playMusic(){
  if(!actx) return;
  const s=seasons[season]||seasons.autumn;
  const notes={winter:[330,370,440,494],spring:[392,440,494,523],summer:[440,494,554,587],autumn:[294,330,370,392]};
  const chords={winter:[[330,392,494]],spring:[[392,494,587]],summer:[[440,554,659]],autumn:[[294,370,440]]};
  const tempo={winter:600,spring:500,summer:450,autumn:550};
  const n=notes[season], c=chords[season], bpm=tempo[season];
  let idx=0;
  setInterval(()=>{
    if(paused) return;
    const osc=actx.createOscillator(), gain=actx.createGain();
    osc.type='sine'; osc.frequency.value=n[idx%n.length];
    gain.gain.setValueAtTime(0.08,actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,actx.currentTime+0.4);
    osc.connect(gain).connect(musMaster);
    osc.start(); osc.stop(actx.currentTime+0.4);
    idx++;
  },bpm);
}

// MAIN LOOP
function animate(){
  if(!paused) requestAnimationFrame(animate);
  const dt=1/60;
  updateMovement(dt);
  updateObjects(dt);
  sendNet();
  drawMinimap();
  if(renderer&&scene&&camera) renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  if(!camera||!renderer) return;
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
